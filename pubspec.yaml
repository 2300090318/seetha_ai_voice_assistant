name: seetha
description: SEETHA Personal Voice AI Assistant
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # AI & Networking
  http: ^1.2.0

  # Voice
  speech_to_text: ^6.6.0
  flutter_tts: ^4.0.2

  # Photo Editing
  image: ^4.1.3
  image_cropper: ^5.0.0
  photo_manager: ^3.0.0
  colorfilter_generator: ^0.0.8

  # Video Editing
  ffmpeg_kit_flutter: ^6.0.3
  video_player: ^2.8.2
  video_thumbnail: ^0.5.3

  # App Launching
  android_intent_plus: ^4.0.0
  device_apps: ^2.2.0
  url_launcher: ^6.2.5

  # Contacts & Communication
  contacts_service: ^0.6.3
  permission_handler: ^11.3.0

  # Storage & Database
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.9.0

  # UI & Animations
  lottie: ^3.1.0
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # State Management
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/animations/
